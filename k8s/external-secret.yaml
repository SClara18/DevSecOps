# External Secrets Operator — pulls secrets from GCP Secret Manager into k8s.
#
# Why ESO over plain k8s Secrets?
#   Kubernetes secrets are base64, not encrypted at rest by default.
#   ESO keeps the source of truth in GCP SM (which has IAM + audit logging)
#   and syncs them in. Rotation in GCP SM propagates here within 5 minutes
#   without a pod restart or image rebuild.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
  namespace: chronospay
spec:
  provider:
    gcpsm:
      projectID: payments-prod
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: prod-cluster
          serviceAccountRef:
            name: chronospay-secrets-reader   # roles/secretmanager.secretAccessor only
            namespace: chronospay

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: chronospay-secrets
  namespace: chronospay
  labels:
    app: chronospay
    pci-scope: cde
  annotations:
    rotation-schedule: "quarterly per PCI 8.3.9"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: chronospay-secrets
    creationPolicy: Owner
    deletionPolicy: Retain   # don't delete the k8s secret if ESO goes down
  data:
    - secretKey: PROCESSOR_API_KEY
      remoteRef:
        key: chronospay/processor-api-key
        version: latest
    - secretKey: WEBHOOK_SECRET
      remoteRef:
        key: chronospay/webhook-signature-secret
        version: latest
    - secretKey: DB_CONNECTION_STR
      remoteRef:
        key: chronospay/db-connection-string
        version: latest

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronospay
  namespace: chronospay
  labels:
    app: chronospay
    pci-scope: cde
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chronospay
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: chronospay
    spec:
      serviceAccountName: chronospay-workload
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: chronospay
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always   # never use a cached layer that bypassed scanning

          ports:
            - containerPort: 8080

          envFrom:
            - secretRef:
                name: chronospay-secrets   # injected by ESO from GCP SM

          env:
            - name: ALLOWED_PROCESSORS
              valueFrom:
                configMapKeyRef:
                  name: chronospay-config
                  key: allowed_processors

          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }

          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      imagePullSecrets:
        - name: gar-pull-secret

      # spread across nodes for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [chronospay]
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: chronospay
  namespace: chronospay
spec:
  selector:
    app: chronospay
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer
